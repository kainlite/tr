name: Automerge
on: pull_request

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  tests:
    uses: ./.github/workflows/coverage.yaml
  dependabot:
    needs: [tests]
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve a PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Merge Dependabot PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash "$PR_URL"

  docker:
    name: Build and push Docker image after merge
    needs: [dependabot]
    runs-on: ubuntu-24.04-arm
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout merged master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Get merged commit SHA
        id: sha
        run: |
          git fetch origin master
          echo "sha=$(git rev-parse origin/master)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/kainlite/tr:latest
            ghcr.io/kainlite/tr:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
